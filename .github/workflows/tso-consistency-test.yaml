name: TSO Consistency Test
on:
  pull_request:
    branches:
      - release-8.5-keyspace
jobs:
  tso-consistency-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - name: Make TSO Consistency Test
        run: make test-tso-consistency
