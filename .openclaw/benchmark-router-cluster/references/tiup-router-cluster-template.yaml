global:
  user: "admin"
  ssh_port: 22
  deploy_dir: "/tidb-deploy"
  data_dir: "/tidb-data"
  pd_mode: "ms"

server_configs:
  pd:
    replication.location-labels: ["zone", "dc", "host"]

pd_servers:
  - host: 127.0.0.1
    client_port: 2379
    peer_port: 2380

tso_servers:
  - host: 127.0.0.1
    port: 2479

router_servers:
  - host: 127.0.0.1
    port: 2579

scheduling_servers:
  - host: 127.0.0.1
    port: 2679

tidb_servers:
  - host: 127.0.0.1
    port: 4000
    status_port: 40001

tikv_servers:
  - host: 127.0.0.1
    port: 12800
    status_port: 12801
    config:
      server.grpc-concurrency: 4
      server.labels: { zone: "zone1", dc: "dc1", host: "host1" }
  - host: 127.0.0.1
    port: 12900
    status_port: 12901
    config:
      server.grpc-concurrency: 4
      server.labels: { zone: "zone1", dc: "dc1", host: "host2" }
  - host: 127.0.0.1
    port: 12700
    status_port: 12701
    config:
      server.grpc-concurrency: 4
      server.labels: { zone: "zone1", dc: "dc1", host: "host3" }

monitoring_servers:
  - host: 127.0.0.1
    port: 3001

grafana_servers:
  - host: 127.0.0.1
    port: 3000

alertmanager_servers:
  - host: 127.0.0.1
